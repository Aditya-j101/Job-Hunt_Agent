version: "3.9"

services:
  job-hunt-agent:
    build: .
    container_name: job-hunt-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # mount data folder so results.db and report.md persist
      # outside the container across restarts
      - ./data:/app/data
      - ./utils:/app/utils
      - ./graph:/app/graph
      - ./models:/app/models
    restart: unless-stopped